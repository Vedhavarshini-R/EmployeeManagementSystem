<div class="login-wrapper">

  <!-- ── LEFT PANEL ─────────────────────────────── -->
  <div class="left-panel">
    <div class="geo-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Top logo -->
    <div class="left-top-logo">
      <div class="left-logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="7" width="20" height="14" rx="2"/>
          <path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/>
        </svg>
      </div>
      <span class="left-logo-text">EMS Portal</span>
    </div>

    <!-- Centre branding — clean, no clutter -->
    <div class="branding">
      <div class="logo-mark">
        <div class="logo-3d-block">
          <span class="logo-letter logo-e">E</span>
          <span class="logo-letter logo-m">M</span>
          <span class="logo-letter logo-s">S</span>
        </div>
      </div>
      <div class="brand-divider"></div>
      <p class="brand-sub">Employee Management System</p>
    </div>

    <!-- Bottom version stamp -->
    <div class="left-footer">
      <span class="version-stamp">EMS v2.0</span>
    </div>

  </div>

  <!-- ── RIGHT PANEL ────────────────────────────── -->
  <div class="right-panel"
       (mousemove)="onMouseMove($event)"
       (mouseleave)="onMouseLeave()">

    <div class="form-container" #formCard>

      <div class="form-header">
        <div class="welcome-badge">
          <span class="badge-dot"></span>
          Secure Portal
        </div>
        <h2 class="form-title">Sign in to your account</h2>
        <p class="form-subtitle">Choose your role, then enter your credentials</p>
      </div>

      <!-- Role selector -->
      <div class="role-grid">

        <button type="button" class="role-card"
          [class.selected]="selectedRole === 'ADMIN'"
          (click)="selectedRole = 'ADMIN'">
          <div class="role-icon admin-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
          </div>
          <span class="role-label">Admin</span>
          <span class="role-desc">Full access</span>
          <div class="role-check">
            <svg viewBox="0 0 16 16" fill="currentColor">
              <path d="M13.5 2.5L6 10 2.5 6.5 1 8l5 5 9-9z"/>
            </svg>
          </div>
        </button>

        <button type="button" class="role-card"
          [class.selected]="selectedRole === 'HR'"
          (click)="selectedRole = 'HR'">
          <div class="role-icon hr-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
            </svg>
          </div>
          <span class="role-label">HR</span>
          <span class="role-desc">People ops</span>
          <div class="role-check">
            <svg viewBox="0 0 16 16" fill="currentColor">
              <path d="M13.5 2.5L6 10 2.5 6.5 1 8l5 5 9-9z"/>
            </svg>
          </div>
        </button>

        <button type="button" class="role-card"
          [class.selected]="selectedRole === 'EMPLOYEE'"
          (click)="selectedRole = 'EMPLOYEE'">
          <div class="role-icon emp-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="2" y="7" width="20" height="14" rx="2"/>
              <path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/>
            </svg>
          </div>
          <span class="role-label">Employee</span>
          <span class="role-desc">Personal view</span>
          <div class="role-check">
            <svg viewBox="0 0 16 16" fill="currentColor">
              <path d="M13.5 2.5L6 10 2.5 6.5 1 8l5 5 9-9z"/>
            </svg>
          </div>
        </button>

      </div>

      <!-- divider -->
      <div class="form-divider"><span>Enter credentials</span></div>

      <!-- Username -->
      <div class="field-group">
        <label class="field-label">Username</label>
        <div class="field-wrap" [class.focused]="userFocused" [class.filled]="username">
          <div class="field-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <input type="text" class="field-input"
            [(ngModel)]="username"
            (focus)="userFocused=true" (blur)="userFocused=false"/>
        </div>
      </div>

      <!-- Password -->
      <div class="field-group">
        <label class="field-label">Password</label>
        <div class="field-wrap" [class.focused]="passFocused" [class.filled]="password">
          <div class="field-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
          </div>
          <input [type]="hidePassword ? 'password' : 'text'" class="field-input"
            [(ngModel)]="password"
            (focus)="passFocused=true" (blur)="passFocused=false"/>
          <button type="button" class="toggle-pass" (click)="hidePassword=!hidePassword">
            <svg *ngIf="hidePassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="!hidePassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19M1 1l22 22"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Error -->
      <div class="error-msg" [class.visible]="errorMsg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ errorMsg }}
      </div>

      <!-- Remember me -->
      <div class="remember-row">
        <label class="remember-label">
          <input type="checkbox" class="remember-check" [(ngModel)]="rememberMe"/>
          <span class="check-box">
            <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="2,6 5,9 10,3"/>
            </svg>
          </span>
          Remember me
        </label>
      </div>

      <!-- Sign in button -->
      <button type="button" class="login-btn"
        [disabled]="isLoading" (click)="login()">
        <span *ngIf="!isLoading">Sign in</span>
        <span class="btn-spinner" *ngIf="isLoading">
          <span class="spinner"></span> Signing in…
        </span>
        <div class="btn-shimmer"></div>
      </button>

      <p class="form-footer">
        Protected by JWT · EMS v2.0 · &copy; {{ year }}
      </p>

    </div>
  </div>

</div>
